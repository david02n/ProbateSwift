<svg viewBox="0 0 680 928" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
<title id="t">ProbateSwift full estate journey, happy path, IHT400 estate</title>
<desc id="d">A vertical timeline of seven phases over roughly nine to eighteen months: qualify, value the estate, prepare the IHT400 return, pay and submit the IHT return in a strict pay-tax-then-get-code sequence, apply for probate, grant issued, then administer and distribute. The paid £295 milestone sits in the middle; the product acts as a companion throughout.</desc>
<defs>
<style>
.title{font:700 18px ui-sans-serif,system-ui,sans-serif;fill:#26215C}
.sub{font:400 12.5px ui-sans-serif,system-ui,sans-serif;fill:#5F5E5A}
.th{font:600 13.5px ui-sans-serif,system-ui,sans-serif;fill:#2C2C2A}
.ts{font:400 11.5px ui-sans-serif,system-ui,sans-serif;fill:#5F5E5A}
.cap{font:700 10px ui-sans-serif,system-ui,sans-serif;letter-spacing:.04em}
.chip{font:600 10px ui-sans-serif,system-ui,sans-serif}
</style>
</defs>
<rect x="0" y="0" width="680" height="928" rx="12" fill="#FBFAF8"/>
<text class="title" x="28" y="34">ProbateSwift — full estate journey</text>
<text class="sub" x="28" y="53">Happy path, IHT400 estate · ≈ 9–18 months · paid milestone in the middle, companion throughout</text>

<line x1="58" y1="92" x2="58" y2="888" stroke="#CECBF6" stroke-width="2.5"/>

<circle cx="58" cy="100" r="8" fill="#7F77DD"/>
<line x1="66" y1="100" x2="92" y2="100" stroke="#CECBF6" stroke-width="2"/>
<rect x="92" y="78" width="564" height="86" rx="10" fill="#FFFFFF" stroke="#E5E3DA" stroke-width="1.3"/>
<rect x="92" y="78" width="6" height="86" fill="#7F77DD"/>
<text class="th" x="112" y="104">1 · Qualify — assessment</text>
<rect x="552" y="88" width="46" height="18" rx="9" fill="#E1F5EE" stroke="#5DCAA5"/><text class="chip" x="575" y="100" text-anchor="middle" fill="#0F6E56">Free</text>
<rect x="602" y="88" width="46" height="18" rx="9" fill="#F1EFE8" stroke="#D3D1C7"/><text class="chip" x="625" y="100" text-anchor="middle" fill="#5F5E5A">Day 0</text>
<text class="ts" x="112" y="128">Real: death registered, will in hand; grant clearly needed, executor route</text>
<text class="ts" x="112" y="148">Product: assessment → proceed; account created on one record</text>

<circle cx="58" cy="200" r="8" fill="#7F77DD"/>
<line x1="66" y1="200" x2="92" y2="200" stroke="#CECBF6" stroke-width="2"/>
<rect x="92" y="178" width="564" height="104" rx="10" fill="#FFFFFF" stroke="#E5E3DA" stroke-width="1.3"/>
<rect x="92" y="178" width="6" height="104" fill="#7F77DD"/>
<text class="th" x="112" y="204">2 · Value the estate — evaluation</text>
<rect x="540" y="188" width="58" height="18" rx="9" fill="#E1F5EE" stroke="#5DCAA5"/><text class="chip" x="569" y="200" text-anchor="middle" fill="#0F6E56">Free</text>
<rect x="602" y="188" width="46" height="18" rx="9" fill="#F1EFE8" stroke="#D3D1C7"/><text class="chip" x="625" y="200" text-anchor="middle" fill="#5F5E5A">Wk 1–8</text>
<text class="ts" x="112" y="228">Real: write to banks, NS&amp;I, share registrar; value the house; list debts</text>
<text class="ts" x="112" y="248">Product: generates the letters, tracks replies, auto-reads statements</text>
<text class="ts" x="112" y="268" fill="#993C1D">The real long pole — calendar latency no software removes</text>

<circle cx="58" cy="320" r="8" fill="#7F77DD"/>
<line x1="66" y1="320" x2="92" y2="320" stroke="#CECBF6" stroke-width="2"/>
<rect x="92" y="298" width="564" height="86" rx="10" fill="#FFFFFF" stroke="#E5E3DA" stroke-width="1.3"/>
<rect x="92" y="298" width="6" height="86" fill="#7F77DD"/>
<text class="th" x="112" y="324">3 · Prepare the IHT return</text>
<rect x="560" y="308" width="88" height="18" rx="9" fill="#F1EFE8" stroke="#D3D1C7"/><text class="chip" x="604" y="320" text-anchor="middle" fill="#5F5E5A">After values</text>
<text class="ts" x="112" y="348">Real: ~£600k estate, tax due → not excepted → IHT400 required</text>
<text class="ts" x="112" y="368">Product: fills IHT400 + schedules (405 / 406 / 435–436); computes ~£40k</text>

<circle cx="58" cy="420" r="9" fill="#D85A30"/>
<line x1="67" y1="420" x2="92" y2="420" stroke="#F0997B" stroke-width="2"/>
<rect x="92" y="398" width="564" height="132" rx="10" fill="#FFFFFF" stroke="#F0997B" stroke-width="1.6"/>
<rect x="92" y="398" width="6" height="132" fill="#D85A30"/>
<text class="th" x="112" y="424">4 · Pay, then the strict IHT sequence</text>
<rect x="556" y="408" width="42" height="18" rx="9" fill="#FAECE7" stroke="#F0997B"/><text class="chip" x="577" y="420" text-anchor="middle" fill="#993C1D">£295</text>
<rect x="602" y="408" width="46" height="18" rx="9" fill="#F1EFE8" stroke="#D3D1C7"/><text class="chip" x="625" y="420" text-anchor="middle" fill="#5F5E5A">3–4 wk</text>
<text class="th" x="112" y="448" fill="#993C1D">IHT must be paid BEFORE the grant</text>
<text class="ts" x="112" y="468">Real: Direct Payment Scheme pays HMRC from the accounts; post IHT400 (paper)</text>
<text class="ts" x="112" y="486">£295 charged as the forms finalise; wait ~15–20 working days for HMRC's code</text>
<rect x="112" y="496" width="528" height="26" rx="7" fill="#FAEEDA" stroke="#EF9F27"/>
<text class="ts" x="124" y="513" fill="#854F0B">Sequence is strict: pay tax → get the unique code (replaced IHT421) → only then apply</text>

<circle cx="58" cy="564" r="8" fill="#7F77DD"/>
<line x1="66" y1="564" x2="92" y2="564" stroke="#CECBF6" stroke-width="2"/>
<rect x="92" y="542" width="564" height="92" rx="10" fill="#FFFFFF" stroke="#E5E3DA" stroke-width="1.3"/>
<rect x="92" y="542" width="6" height="92" fill="#7F77DD"/>
<text class="th" x="112" y="568">5 · Apply for probate</text>
<rect x="556" y="552" width="92" height="18" rx="9" fill="#FAECE7" stroke="#F0997B"/><text class="chip" x="602" y="564" text-anchor="middle" fill="#993C1D">£300 court fee</text>
<text class="ts" x="112" y="592">Real: apply online with the HMRC code, pay £300, post the will + death cert</text>
<text class="ts" x="112" y="612">Product: PA1P autofill; statement of truth; what-to-post checklist</text>

<circle cx="58" cy="668" r="8" fill="#1D9E75"/>
<line x1="66" y1="668" x2="92" y2="668" stroke="#9FE1CB" stroke-width="2"/>
<rect x="92" y="646" width="564" height="88" rx="10" fill="#FFFFFF" stroke="#E5E3DA" stroke-width="1.3"/>
<rect x="92" y="646" width="6" height="88" fill="#1D9E75"/>
<text class="th" x="112" y="672">6 · Grant issued</text>
<rect x="588" y="656" width="60" height="18" rx="9" fill="#F1EFE8" stroke="#D3D1C7"/><text class="chip" x="618" y="668" text-anchor="middle" fill="#5F5E5A">4–12 wk</text>
<text class="ts" x="112" y="696">Real: grant arrives; order sealed office copies (~£1.50 each), one per holder</text>
<text class="ts" x="112" y="716">Product: records the grant; unlocks the administration phase</text>

<circle cx="58" cy="768" r="8" fill="#1D9E75"/>
<line x1="66" y1="768" x2="92" y2="768" stroke="#9FE1CB" stroke-width="2"/>
<rect x="92" y="746" width="564" height="112" rx="10" fill="#FFFFFF" stroke="#E5E3DA" stroke-width="1.3"/>
<rect x="92" y="746" width="6" height="112" fill="#1D9E75"/>
<text class="th" x="112" y="772">7 · Administer &amp; distribute</text>
<rect x="568" y="756" width="80" height="18" rx="9" fill="#F1EFE8" stroke="#D3D1C7"/><text class="chip" x="608" y="768" text-anchor="middle" fill="#5F5E5A">Months 4–12</text>
<text class="ts" x="112" y="796">Real: collect funds, sell/transfer the house, settle debts + IHT instalments</text>
<text class="ts" x="112" y="816">Gazette notice (2-month creditor window); estate accounts; distribute</text>
<text class="ts" x="112" y="836">Hold final distribution ~6 months post-grant (1975 Act) → estate closed</text>

<circle cx="58" cy="888" r="8" fill="#534AB7"/>
<text class="th" x="112" y="893">≈ 9–18 months end to end</text>

<rect x="28" y="906" width="11" height="11" rx="3" fill="#7F77DD"/><text class="ts" x="45" y="915">Product-guided</text>
<rect x="150" y="906" width="11" height="11" rx="3" fill="#D85A30"/><text class="ts" x="167" y="915">Paid / critical</text>
<rect x="266" y="906" width="11" height="11" rx="3" fill="#1D9E75"/><text class="ts" x="283" y="915">Milestone win</text>
<rect x="386" y="906" width="11" height="11" rx="3" fill="#FAEEDA" stroke="#EF9F27"/><text class="ts" x="403" y="915">Watch the sequence</text>
</svg>